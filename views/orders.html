<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StackEats — My Orders</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --amber: #f59e0b;
        --amber-dark: #b45309;
        --bg: #0d0d0d;
        --surface: #1a1a1a;
        --surface2: #242424;
        --border: #2e2e2e;
        --text: #f0ede8;
        --muted: #888;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
      }
      .navbar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0.75rem 1.5rem;
      }
      .navbar-brand {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2rem;
        color: var(--amber) !important;
        letter-spacing: 2px;
      }
      .nav-link {
        color: var(--muted) !important;
        font-size: 0.9rem;
      }
      .nav-link:hover {
        color: var(--text) !important;
      }
      .btn-amber {
        background: var(--amber);
        color: #000;
        font-weight: 500;
        border: none;
        border-radius: 6px;
        padding: 0.4rem 1.1rem;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-amber:hover {
        background: var(--amber-dark);
        color: #fff;
      }
      .btn-outline {
        border: 1px solid var(--border);
        color: var(--muted);
        background: transparent;
        border-radius: 6px;
        padding: 0.4rem 0.9rem;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-outline:hover {
        border-color: var(--text);
        color: var(--text);
      }
      .btn-danger-sm {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
        border-radius: 6px;
        padding: 0.25rem 0.7rem;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-danger-sm:hover {
        background: rgba(239, 68, 68, 0.2);
      }

      .page-wrap {
        max-width: 1000px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      h2.section-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2rem;
        letter-spacing: 2px;
        color: var(--amber);
        margin-bottom: 1.25rem;
      }

      /* ── Two-column grid layout (Bootstrap) ────────────────────── */
      .order-layout {
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: 1.5rem;
      }
      @media (max-width: 768px) {
        .order-layout {
          grid-template-columns: 1fr;
        }
      }

      /* ── Cart card ───────────────────────────────────────────────── */
      .card-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
      }
      .cart-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 0;
        border-bottom: 1px solid var(--border);
      }
      .cart-item:last-of-type {
        border-bottom: none;
      }
      .cart-item-name {
        font-size: 0.95rem;
        font-weight: 500;
      }
      .cart-item-meta {
        font-size: 0.8rem;
        color: var(--muted);
      }
      .cart-item-price {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.1rem;
        color: var(--amber);
      }
      .cart-empty {
        color: var(--muted);
        font-size: 0.9rem;
        text-align: center;
        padding: 2rem 0;
      }
      .cart-total {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 1rem;
        margin-top: 0.5rem;
        border-top: 1px solid var(--border);
      }
      .cart-total span:first-child {
        font-size: 0.9rem;
        color: var(--muted);
      }
      .cart-total span:last-child {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.6rem;
        color: var(--amber);
      }

      /* ── Address / map ───────────────────────────────────────────── */
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        font-size: 0.78rem;
        color: var(--muted);
        margin-bottom: 0.4rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .form-group input {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 8px;
        padding: 0.65rem 1rem;
        font-size: 0.9rem;
        font-family: "DM Sans", sans-serif;
        outline: none;
        transition: border-color 0.2s;
      }
      .form-group input:focus {
        border-color: var(--amber);
      }
      #mapContainer {
        height: 200px;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid var(--border);
        margin-top: 0.5rem;
        background: var(--surface2);
        display: none;
      }

      /* ── Order history ───────────────────────────────────────────── */
      .order-row {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem 1.25rem;
        margin-bottom: 0.75rem;
      }
      .order-row-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
      }
      .order-id {
        font-size: 0.75rem;
        color: var(--muted);
        font-family: monospace;
      }
      .status-badge {
        font-size: 0.72rem;
        border-radius: 20px;
        padding: 3px 10px;
        font-weight: 500;
        text-transform: capitalize;
      }
      .status-pending {
        background: rgba(245, 158, 11, 0.12);
        color: #f59e0b;
        border: 1px solid rgba(245, 158, 11, 0.3);
      }
      .status-confirmed {
        background: rgba(59, 130, 246, 0.12);
        color: #60a5fa;
        border: 1px solid rgba(59, 130, 246, 0.3);
      }
      .status-preparing {
        background: rgba(168, 85, 247, 0.12);
        color: #c084fc;
        border: 1px solid rgba(168, 85, 247, 0.3);
      }
      .status-ready {
        background: rgba(34, 197, 94, 0.12);
        color: #4ade80;
        border: 1px solid rgba(34, 197, 94, 0.3);
      }
      .status-delivered {
        background: rgba(34, 197, 94, 0.18);
        color: #4ade80;
        border: 1px solid rgba(34, 197, 94, 0.3);
      }
      .status-cancelled {
        background: rgba(239, 68, 68, 0.1);
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .order-items-list {
        font-size: 0.83rem;
        color: var(--muted);
        margin-bottom: 0.5rem;
      }
      .order-total {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.2rem;
        color: var(--amber);
      }

      .alert-box {
        border-radius: 8px;
        padding: 0.75rem 1rem;
        font-size: 0.875rem;
        margin-bottom: 1rem;
        display: none;
      }
      .alert-error {
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
      }
      .alert-success {
        background: rgba(34, 197, 94, 0.12);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: #4ade80;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">StackEats</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Menu</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="orders.html">My Orders</a>
            </li>
          </ul>
          <div class="d-flex align-items-center gap-2">
            <span
              style="color: var(--muted); font-size: 0.85rem"
              id="nav-username"
            ></span>
            <button class="btn-amber" onclick="logout()">Logout</button>
          </div>
        </div>
      </div>
    </nav>

    <div class="page-wrap">
      <div class="alert-box alert-error" id="alertError"></div>
      <div class="alert-box alert-success" id="alertSuccess"></div>

      <div class="order-layout">
        <!-- ── Left: Order history ─────────────────────────────────────── -->
        <div>
          <h2 class="section-title">Order History</h2>
          <div id="ordersList"><p class="cart-empty">Loading orders…</p></div>
        </div>

        <!-- ── Right: Cart + checkout ──────────────────────────────────── -->
        <div>
          <h2 class="section-title">Your Cart</h2>
          <div class="card-panel">
            <div id="cartItems">
              <p class="cart-empty">
                Your cart is empty.<br /><a
                  href="index.html"
                  style="color: var(--amber)"
                  >Browse the menu</a
                >
              </p>
            </div>
            <div class="cart-total" id="cartTotal" style="display: none">
              <span>Total</span>
              <span id="totalAmt">$0.00</span>
            </div>

            <!-- Delivery address + Google Maps -->
            <div
              id="checkoutSection"
              style="display: none; margin-top: 1.25rem"
            >
              <div class="form-group">
                <label>Delivery address</label>
                <input
                  type="text"
                  id="deliveryAddr"
                  placeholder="123 Main St, Vancouver, BC"
                  oninput="geocodeAddress()"
                />
              </div>
              <div id="mapContainer">
                <iframe
                  id="mapFrame"
                  width="100%"
                  height="200"
                  style="border: 0"
                  allowfullscreen
                  loading="lazy"
                ></iframe>
              </div>
              <button
                class="btn-amber w-100 mt-3"
                style="
                  width: 100%;
                  padding: 0.75rem;
                  font-size: 1rem;
                  border-radius: 8px;
                "
                onclick="placeOrder()"
              >
                Place Order
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // ── Auth guard ─────────────────────────────────────────────────────────
      const token = localStorage.getItem("se_token");
      const user = JSON.parse(localStorage.getItem("se_user") || "null");
      if (!token || !user) {
        window.location.href = "login.html";
      }
      document.getElementById("nav-username").textContent =
        user?.username || "";

      function logout() {
        localStorage.removeItem("se_token");
        localStorage.removeItem("se_user");
        localStorage.removeItem("se_cart");
        window.location.href = "login.html";
      }

      const authHeaders = {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`,
      };
      let cart = JSON.parse(localStorage.getItem("se_cart") || "[]");

      // ── Render cart ────────────────────────────────────────────────────────
      function renderCart() {
        const wrap = document.getElementById("cartItems");
        const total = document.getElementById("cartTotal");
        const checkout = document.getElementById("checkoutSection");
        if (!cart.length) {
          wrap.innerHTML =
            '<p class="cart-empty">Your cart is empty.<br><a href="index.html" style="color:var(--amber)">Browse the menu</a></p>';
          total.style.display = checkout.style.display = "none";
          return;
        }
        const sum = cart.reduce((s, i) => s + i.price * i.quantity, 0);
        wrap.innerHTML = cart
          .map(
            (item, idx) => `
      <div class="cart-item">
        <div>
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-meta">×${item.quantity} &nbsp;$${item.price.toFixed(2)} each</div>
        </div>
        <div style="display:flex;align-items:center;gap:0.75rem">
          <span class="cart-item-price">$${(item.price * item.quantity).toFixed(2)}</span>
          <button class="btn-danger-sm" onclick="removeItem(${idx})">✕</button>
        </div>
      </div>`,
          )
          .join("");
        document.getElementById("totalAmt").textContent = `$${sum.toFixed(2)}`;
        total.style.display = checkout.style.display = "flex";
        checkout.style.display = "block";
      }

      function removeItem(idx) {
        cart.splice(idx, 1);
        localStorage.setItem("se_cart", JSON.stringify(cart));
        renderCart();
      }

      // ── Google Maps geocoding (Part III — server-side proxy) ───────────────
      let geocodeTimer;
      function geocodeAddress() {
        clearTimeout(geocodeTimer);
        const addr = document.getElementById("deliveryAddr").value.trim();
        if (addr.length < 6) {
          document.getElementById("mapContainer").style.display = "none";
          return;
        }
        geocodeTimer = setTimeout(async () => {
          try {
            // Server-side call to Google Maps API via /api/maps/geocode
            const res = await fetch(
              `/api/maps/geocode?address=${encodeURIComponent(addr)}`,
              { headers: { Authorization: `Bearer ${token}` } },
            );
            const data = await res.json();
            if (data.lat && data.lng) {
              const mapEl = document.getElementById("mapContainer");
              mapEl.style.display = "block";
              document.getElementById("mapFrame").src =
                `https://www.google.com/maps?q=${data.lat},${data.lng}&z=15&output=embed`;
            }
          } catch {
            /* silent fail — map is enhancement only */
          }
        }, 700);
      }

      // ── Place order ────────────────────────────────────────────────────────
      async function placeOrder() {
        const deliveryAddress = document
          .getElementById("deliveryAddr")
          .value.trim();
        if (!deliveryAddress) {
          showError("Please enter a delivery address.");
          return;
        }
        try {
          const res = await fetch("/api/orders", {
            method: "POST",
            headers: authHeaders,
            body: JSON.stringify({ items: cart, deliveryAddress }),
          });
          const data = await res.json();
          if (!res.ok) {
            showError(data.error || "Could not place order.");
            return;
          }
          cart = [];
          localStorage.setItem("se_cart", JSON.stringify(cart));
          showSuccess("Order placed! We'll start preparing it shortly.");
          renderCart();
          loadOrders();
        } catch {
          showError("Server error.");
        }
      }

      // ── Load order history ─────────────────────────────────────────────────
      async function loadOrders() {
        try {
          const res = await fetch("/api/orders", { headers: authHeaders });
          const data = await res.json();
          const list = document.getElementById("ordersList");
          if (!data.orders?.length) {
            list.innerHTML = '<p class="cart-empty">No orders yet.</p>';
            return;
          }
          // Most recent first
          const sorted = [...data.orders].sort(
            (a, b) => new Date(b.createdAt) - new Date(a.createdAt),
          );
          list.innerHTML = sorted
            .map(
              (o) => `
        <div class="order-row">
          <div class="order-row-top">
            <span class="order-id">#${o.id.slice(-8).toUpperCase()}</span>
            <span class="status-badge status-${o.status}">${o.status}</span>
          </div>
          <div class="order-items-list">${o.items.map((i) => `${i.name} ×${i.quantity}`).join(" · ")}</div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:0.78rem;color:var(--muted)">${new Date(o.createdAt).toLocaleDateString("en-CA", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}</span>
            <span class="order-total">$${o.total.toFixed(2)}</span>
          </div>
          ${o.status === "pending" ? `<button class="btn-danger-sm mt-2" onclick="cancelOrder('${o.id}')">Cancel order</button>` : ""}
        </div>`,
            )
            .join("");
        } catch {
          document.getElementById("ordersList").innerHTML =
            '<p class="cart-empty">Could not load orders.</p>';
        }
      }

      async function cancelOrder(id) {
        if (!confirm("Cancel this order?")) return;
        const res = await fetch(`/api/orders/${id}`, {
          method: "DELETE",
          headers: authHeaders,
        });
        if (res.ok) {
          showSuccess("Order cancelled.");
          loadOrders();
        } else {
          const d = await res.json();
          showError(d.error || "Could not cancel.");
        }
      }

      function showError(msg) {
        const el = document.getElementById("alertError");
        el.textContent = msg;
        el.style.display = "block";
        setTimeout(() => (el.style.display = "none"), 4000);
      }
      function showSuccess(msg) {
        const el = document.getElementById("alertSuccess");
        el.textContent = msg;
        el.style.display = "block";
        setTimeout(() => (el.style.display = "none"), 4000);
      }

      renderCart();
      loadOrders();
    </script>
  </body>
</html>
