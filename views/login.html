<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StackEats — Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --amber: #f59e0b;
        --amber-dark: #b45309;
        --bg: #0d0d0d;
        --surface: #1a1a1a;
        --surface2: #242424;
        --border: #2e2e2e;
        --text: #f0ede8;
        --muted: #888;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Navbar ───────────────────────────────────────────────────── */
      .navbar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0.75rem 1.5rem;
      }
      .navbar-brand {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2rem;
        color: var(--amber) !important;
        letter-spacing: 2px;
      }

      /* ── Layout ───────────────────────────────────────────────────── */
      .auth-wrapper {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: calc(100vh - 60px);
      }
      @media (max-width: 768px) {
        .auth-wrapper {
          grid-template-columns: 1fr;
        }
        .brand-panel {
          display: none !important;
        }
      }

      /* ── Brand panel ──────────────────────────────────────────────── */
      .brand-panel {
        background: var(--amber);
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 4rem;
        position: relative;
        overflow: hidden;
      }
      .brand-panel::before {
        content: "STACK EATS";
        font-family: "Bebas Neue", sans-serif;
        font-size: 10rem;
        color: rgba(0, 0, 0, 0.08);
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-15deg);
        white-space: nowrap;
        pointer-events: none;
      }
      .brand-panel h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 3.5rem;
        color: #000;
        line-height: 1;
        letter-spacing: 3px;
        margin-bottom: 1rem;
      }
      .brand-panel p {
        color: rgba(0, 0, 0, 0.65);
        font-size: 1rem;
        line-height: 1.7;
      }

      /* ── Form panel ───────────────────────────────────────────────── */
      .form-panel {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .auth-card {
        width: 100%;
        max-width: 420px;
      }
      .auth-card h3 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.2rem;
        letter-spacing: 2px;
        color: var(--amber);
        margin-bottom: 0.25rem;
      }
      .auth-card p.sub {
        color: var(--muted);
        font-size: 0.88rem;
        margin-bottom: 2rem;
      }

      /* ── Tabs ─────────────────────────────────────────────────────── */
      .auth-tabs {
        display: flex;
        gap: 0;
        margin-bottom: 2rem;
        border-bottom: 1px solid var(--border);
      }
      .auth-tab {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 0.9rem;
        padding: 0.6rem 1.2rem;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        transition: all 0.2s;
        font-family: "DM Sans", sans-serif;
      }
      .auth-tab.active {
        color: var(--amber);
        border-bottom-color: var(--amber);
      }

      /* ── Form inputs ──────────────────────────────────────────────── */
      .form-group {
        margin-bottom: 1.1rem;
      }
      .form-group label {
        display: block;
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 0.4rem;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .form-group input {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 8px;
        padding: 0.65rem 1rem;
        font-size: 0.95rem;
        font-family: "DM Sans", sans-serif;
        transition: border-color 0.2s;
        outline: none;
      }
      .form-group input:focus {
        border-color: var(--amber);
      }
      .form-group input::placeholder {
        color: var(--muted);
      }

      /* ── Responsive design: role select ──────────────────────────── */
      .form-group select {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 8px;
        padding: 0.65rem 1rem;
        font-size: 0.95rem;
        font-family: "DM Sans", sans-serif;
        outline: none;
        cursor: pointer;
      }
      .form-group select:focus {
        border-color: var(--amber);
      }

      /* ── Submit button ────────────────────────────────────────────── */
      .btn-submit {
        width: 100%;
        background: var(--amber);
        color: #000;
        font-weight: 500;
        border: none;
        border-radius: 8px;
        padding: 0.75rem;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 0.5rem;
        font-family: "DM Sans", sans-serif;
      }
      .btn-submit:hover {
        background: var(--amber-dark);
        color: #fff;
      }
      .btn-submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ── Error / success ──────────────────────────────────────────── */
      .alert-box {
        border-radius: 8px;
        padding: 0.75rem 1rem;
        font-size: 0.875rem;
        margin-bottom: 1rem;
        display: none;
      }
      .alert-error {
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
      }
      .alert-success {
        background: rgba(34, 197, 94, 0.12);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: #4ade80;
      }
    </style>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <!-- ── Navbar ─────────────────────────────────────────────────────────── -->
    <nav class="navbar">
      <a class="navbar-brand" href="index.html">StackEats</a>
    </nav>

    <div class="auth-wrapper">
      <!-- ── Brand panel ──────────────────────────────────────────────────── -->
      <div class="brand-panel">
        <h2>GOOD FOOD,<br />FAST ORDER.</h2>
        <p>
          Create an account to place orders, track deliveries, and save your
          favourites. Takes 30 seconds.
        </p>
      </div>

      <!-- ── Form panel ───────────────────────────────────────────────────── -->
      <div class="form-panel">
        <div class="auth-card">
          <div class="auth-tabs">
            <button
              class="auth-tab active"
              id="tab-login"
              onclick="switchTab('login')"
            >
              Login
            </button>
            <button
              class="auth-tab"
              id="tab-register"
              onclick="switchTab('register')"
            >
              Register
            </button>
          </div>

          <div class="alert-box alert-error" id="alertError"></div>
          <div class="alert-box alert-success" id="alertSuccess"></div>

          <!-- ── Login form ──────────────────────────────────────────────── -->
          <div id="loginForm">
            <div class="form-group">
              <label>Username</label>
              <input
                type="text"
                id="login-username"
                placeholder="your username"
                autocomplete="username"
              />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input
                type="password"
                id="login-password"
                placeholder="••••••••"
                autocomplete="current-password"
              />
            </div>
            <button class="btn-submit" id="loginBtn" onclick="doLogin()">
              Login
            </button>
          </div>

          <!-- ── Register form ───────────────────────────────────────────── -->
          <div id="registerForm" style="display: none">
            <div class="form-group">
              <label>Username</label>
              <input
                type="text"
                id="reg-username"
                placeholder="choose a username"
                autocomplete="username"
              />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input
                type="password"
                id="reg-password"
                placeholder="min. 6 characters"
                autocomplete="new-password"
              />
            </div>
            <div class="form-group">
              <label>Account type</label>
              <select id="reg-role">
                <option value="member">Member — place orders</option>
                <option value="guest">Guest — browse only</option>
              </select>
            </div>
            <button class="btn-submit" id="registerBtn" onclick="doRegister()">
              Create Account
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Redirect if already logged in
      if (localStorage.getItem("se_token")) window.location.href = "index.html";

      function switchTab(tab) {
        document.getElementById("loginForm").style.display =
          tab === "login" ? "block" : "none";
        document.getElementById("registerForm").style.display =
          tab === "register" ? "block" : "none";
        document
          .getElementById("tab-login")
          .classList.toggle("active", tab === "login");
        document
          .getElementById("tab-register")
          .classList.toggle("active", tab === "register");
        clearAlerts();
      }

      function showError(msg) {
        const el = document.getElementById("alertError");
        el.textContent = msg;
        el.style.display = "block";
        document.getElementById("alertSuccess").style.display = "none";
      }
      function showSuccess(msg) {
        const el = document.getElementById("alertSuccess");
        el.textContent = msg;
        el.style.display = "block";
        document.getElementById("alertError").style.display = "none";
      }
      function clearAlerts() {
        document.getElementById("alertError").style.display = "none";
        document.getElementById("alertSuccess").style.display = "none";
      }

      async function doLogin() {
        const username = document.getElementById("login-username").value.trim();
        const password = document.getElementById("login-password").value;
        if (!username || !password)
          return showError("Please fill in all fields.");

        const btn = document.getElementById("loginBtn");
        btn.disabled = true;
        btn.textContent = "Logging in…";

        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();
          if (!res.ok) {
            showError(data.error || "Login failed.");
            return;
          }

          localStorage.setItem("se_token", data.token);
          localStorage.setItem("se_user", JSON.stringify(data.user));
          showSuccess("Welcome back! Redirecting…");
          setTimeout(() => {
            window.location.href =
              data.user.role === "admin" ? "admin.html" : "index.html";
          }, 900);
        } catch {
          showError("Server error. Is the server running?");
        } finally {
          btn.disabled = false;
          btn.textContent = "Login";
        }
      }

      async function doRegister() {
        const username = document.getElementById("reg-username").value.trim();
        const password = document.getElementById("reg-password").value;
        const role = document.getElementById("reg-role").value;
        if (!username || !password)
          return showError("Please fill in all fields.");
        if (password.length < 6)
          return showError("Password must be at least 6 characters.");

        const btn = document.getElementById("registerBtn");
        btn.disabled = true;
        btn.textContent = "Creating account…";

        try {
          const res = await fetch("/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password, role }),
          });
          const data = await res.json();
          if (!res.ok) {
            showError(data.error || "Registration failed.");
            return;
          }

          localStorage.setItem("se_token", data.token);
          localStorage.setItem("se_user", JSON.stringify(data.user));
          showSuccess("Account created! Redirecting…");
          setTimeout(() => (window.location.href = "index.html"), 900);
        } catch {
          showError("Server error. Is the server running?");
        } finally {
          btn.disabled = false;
          btn.textContent = "Create Account";
        }
      }

      // Allow Enter key to submit
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        if (document.getElementById("loginForm").style.display !== "none")
          doLogin();
        else doRegister();
      });
    </script>
  </body>
  <footer
    class="mt-auto py-3"
    style="background: var(--surface); border-top: 1px solid var(--border)"
  >
    <div class="container-fluid">
      <div class="row align-items-center">
        <div class="col-md-4 text-center text-md-start mb-2 mb-md-0">
          <span
            style="
              font-family: &quot;Bebas Neue&quot;, sans-serif;
              font-size: 1.2rem;
              color: var(--amber);
              letter-spacing: 2px;
            "
            >StackEats</span
          >
        </div>
        <div class="col-md-4 text-center mb-2 mb-md-0">
          <span style="font-size: 0.8rem; color: var(--muted)">
            &copy; 2026 StackEats. All rights reserved.
          </span>
        </div>
        <div class="col-md-4 text-center text-md-end">
          <span style="font-size: 0.78rem; color: var(--muted)">
            Built with
            <a
              href="https://getbootstrap.com"
              target="_blank"
              style="color: var(--amber); text-decoration: none"
              >Bootstrap 5</a
            >
            &amp; Node.js
          </span>
        </div>
      </div>
    </div>
  </footer>
</html>
